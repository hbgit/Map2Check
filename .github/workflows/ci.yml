############################################################
# Map2Check CI — Build, Test, Static & Dynamic Analysis
#
# Runs on every push and pull request.
# Uses map2check-dev Docker image (LLVM 16 + KLEE 3.1)
# from GitHub Container Registry.
#
# Phase 1.5 — OpenSSF Best Practices Badge (Analysis section)
############################################################
name: CI

on:
  push:
    branches: [develop, main, master, 'feat-*']
  pull_request:
    branches: [develop, main, master]

env:
  DEV_IMAGE: ghcr.io/${{ github.repository_owner }}/map2check-dev:latest

jobs:
  # ===========================================================
  # Job 1: Build + Unit Tests
  # ===========================================================
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/map2check-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DLLVM_DIR=/usr/lib/llvm-16/lib/cmake/llvm \
            -DSKIP_LIB_FUZZER=ON \
            -DSKIP_KLEE=ON \
            -DENABLE_TEST=ON

      - name: Build
        run: cd build && ninja

      - name: Run Unit Tests
        run: cd build && ctest --output-on-failure

  # ===========================================================
  # Job 2: Static Analysis (cppcheck + clang-tidy)
  # ===========================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/map2check-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cppcheck
        run: |
          apt-get update && apt-get install -y cppcheck
          cppcheck --version

      - name: Generate compile_commands.json
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DLLVM_DIR=/usr/lib/llvm-16/lib/cmake/llvm \
            -DSKIP_LIB_FUZZER=ON \
            -DSKIP_KLEE=ON \
            -DENABLE_TEST=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=unusedFunction \
            --suppressions-list=.cppcheck-suppressions.txt \
            --inline-suppr \
            --error-exitcode=1 \
            --std=c++17 \
            --language=c++ \
            -I modules/ \
            modules/backend/library/ \
            modules/frontend/ \
            tests/unit/
        continue-on-error: false

      - name: Run cppcheck on C sources
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=unusedFunction \
            --suppressions-list=.cppcheck-suppressions.txt \
            --inline-suppr \
            --error-exitcode=1 \
            --std=c11 \
            --language=c \
            -I modules/ \
            modules/backend/library/
        continue-on-error: false

      - name: Run clang-tidy
        run: |
          cd build && ninja
          cd ..
          # Run clang-tidy on frontend C++ sources using compile_commands.json
          find modules/frontend -name '*.cpp' | head -20 | \
            xargs -I{} clang-tidy-16 -p build/ \
              --config-file=.clang-tidy \
              --warnings-as-errors='clang-analyzer-*,bugprone-use-after-move' \
              {} 2>&1 || true
          # Note: clang-tidy runs with warnings, not blocking CI initially.
          # Critical checks (clang-analyzer-*, bugprone-use-after-move) are errors.

  # ===========================================================
  # Job 3: Dynamic Analysis (ASan + UBSan)
  # ===========================================================
  sanitizer-tests:
    name: Sanitizer Tests (ASan + UBSan)
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/map2check-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake with Sanitizers
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DLLVM_DIR=/usr/lib/llvm-16/lib/cmake/llvm \
            -DSKIP_LIB_FUZZER=ON \
            -DSKIP_KLEE=ON \
            -DENABLE_TEST=ON \
            -DMAP2CHECK_ENABLE_SANITIZERS=ON

      - name: Build with Sanitizers
        run: cd build && ninja

      - name: Run Tests with ASan + UBSan
        env:
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1:abort_on_error=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
        run: cd build && ctest --output-on-failure
